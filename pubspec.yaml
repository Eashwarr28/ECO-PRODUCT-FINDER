name: eco_product_finder
description: Eco Product Finder App - SDG 12 Responsible Consumption & Production

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  
  # State Management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Confetti Animation
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true